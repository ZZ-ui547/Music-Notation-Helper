<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Editor</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Score Editor">
  <link rel="apple-touch-icon" href="icon.svg">
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #e4e4e4;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      color: #222;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 14px;
      background: #fff;
      border-bottom: 1px solid #d4d4d4;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #111;
      white-space: nowrap;
    }

    .sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      flex-shrink: 0;
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ctrl label {
      color: #777;
      white-space: nowrap;
    }

    select, input[type="number"] {
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 4px 6px;
      font-size: 13px;
      background: #fff;
      color: #222;
      min-height: 32px;
    }

    select:focus, input:focus { outline: 2px solid #bbb; outline-offset: 1px; }

    #export-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.02em;
      min-height: 32px;
      white-space: nowrap;
    }
    #export-btn:hover { background: #333; }

    #clear-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: none;
      color: #888;
      border: 1px solid #ccc;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      min-height: 32px;
      white-space: nowrap;
    }
    #clear-btn:hover { color: #c00; border-color: #c00; }

    #play-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: none;
      color: #444;
      border: 1px solid #bbb;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      min-height: 32px;
      white-space: nowrap;
    }
    #play-btn:hover:not(:disabled) { color: #060; border-color: #060; }
    #play-btn.playing { color: #c00; border-color: #c00; }
    #play-btn.playing:hover:not(:disabled) { color: #900; border-color: #900; }
    #play-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Tab bar (mobile only) ────────────────────────────── */
    #tab-bar {
      display: none;
      flex-shrink: 0;
      border-bottom: 1px solid #d4d4d4;
      background: #fff;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: #111;
      border-bottom-color: #111;
    }

    /* ── Main layout ──────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Editor panel ─────────────────────────────────────── */
    #editor-panel {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #d4d4d4;
    }

    #editor-label {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    #abc-input {
      flex: 1;
      resize: none;
      border: none;
      padding: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.65;
      background: #fff;
      color: #222;
      outline: none;
    }

    /* ── Score panel ──────────────────────────────────────── */
    #score-panel {
      flex: 1;
      overflow: auto;
      background: #e4e4e4;
      padding: 28px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #score-page {
      background: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.18);
      padding: 18mm 15mm;
      width: 210mm;
      min-height: 297mm;
      flex-shrink: 0;
    }

    #score-output svg {
      width: 100% !important;
      height: auto !important;
    }

    /* ── Mobile ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      #toolbar {
        flex-wrap: wrap;
        gap: 8px 10px;
        padding: 8px 12px;
      }

      #toolbar h1 { flex: 1; order: 0; }

      #export-btn { order: 0; min-height: 40px; font-size: 14px; padding: 8px 14px; }
      #clear-btn  { order: 0; min-height: 40px; font-size: 14px; padding: 8px 14px; }
      #play-btn   { order: 0; min-height: 40px; font-size: 14px; padding: 8px 14px; }

      .sep { display: none; }

      .ctrl { order: 1; flex-shrink: 1; }
      .ctrl label { display: none; }

      #ctrl-instrument { flex: 1; min-width: 0; }
      #ctrl-instrument select { width: 100%; min-width: 0; }

      #ctrl-bars { flex-shrink: 0; }

      select, input[type="number"] { font-size: 16px; min-height: 40px; }

      #tab-bar { display: flex; }

      #main { position: relative; }

      #editor-panel, #score-panel {
        position: absolute;
        inset: 0;
        width: 100%;
        display: none;
      }
      #editor-panel.active, #score-panel.active { display: flex; }

      #editor-panel { border-right: none; flex-direction: column; }
      #abc-input { font-size: 14px; padding: 14px; }

      #score-panel {
        background: #fff;
        padding: 12px;
        overflow-y: auto;
        justify-content: flex-start;
        align-items: stretch;
      }

      #score-page { box-shadow: none; padding: 0; width: 100%; min-height: 0; }
    }

    /* ── Print / PDF ──────────────────────────────────────── */
    @media print {
      @page { size: A4 portrait; margin: 15mm; }

      body    { background: #fff; height: auto; }
      #toolbar, #editor-panel, #tab-bar { display: none !important; }
      #main   { display: block; overflow: visible; }

      #score-panel {
        background: none;
        padding: 0;
        overflow: visible;
        display: block;
        position: static;
        width: 100%;
      }

      #score-page { box-shadow: none; padding: 0; width: 100%; min-height: 0; }

      #score-output svg { width: 100% !important; }

      .print-page { break-inside: avoid; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Score Editor</h1>
  <div class="sep"></div>
  <div class="ctrl" id="ctrl-instrument">
    <label for="transpose-select">Instrument</label>
    <select id="transpose-select" aria-label="Instrument">
      <option value="0">Concert (C)</option>
      <option value="0">Violin</option>
      <option value="2">B&#9837; &mdash; Trumpet, Clarinet, Sop./Ten. Sax</option>
      <option value="9">E&#9837; &mdash; Alto / Bari Sax</option>
      <option value="7">F &mdash; French Horn</option>
      <option value="custom">Custom&hellip;</option>
    </select>
  </div>
  <div class="ctrl" id="custom-ctrl" style="display:none">
    <label for="custom-semi">Semitones</label>
    <input type="number" id="custom-semi" value="0" min="-24" max="24" style="width:60px">
  </div>
  <div class="sep"></div>
  <div class="ctrl" id="ctrl-bars">
    <label for="bars-input">Bars / line</label>
    <input type="number" id="bars-input" aria-label="Bars per line" value="4" min="1" max="20" style="width:54px">
  </div>
  <button id="play-btn">&#9654; Play</button>
  <button id="clear-btn">Clear</button>
  <button id="export-btn">Export PDF</button>
</div>

<div id="tab-bar">
  <button class="tab active" data-panel="editor-panel">Editor</button>
  <button class="tab" data-panel="score-panel">Score</button>
</div>

<div id="main">
  <div id="editor-panel" class="active">
    <div id="editor-label">ABC Notation</div>
    <textarea id="abc-input" spellcheck="false">X:1
T:Sample Score
C:Composer
M:4/4
L:1/8
Q:1/4=120
K:C
%% Use "^text" for tempo/expression marks (^ = display only, not played as chord)
|:CDEF GABc|dedB AGFE|DCDE FGAB|cBAG FEDC:|
|:c2ec B2dB|A2FA G2EG|FGAB cdef|gedB c3B:|
|:AGFE DCBA,|B,CDE FGAB|cBAG FEDC|DEFD C4:|</textarea>
  </div>

  <div id="score-panel">
    <div id="score-page">
      <div id="score-output"></div>
    </div>
  </div>
</div>

<script>
  const abcInput   = document.getElementById('abc-input');
  const transpSel  = document.getElementById('transpose-select');
  const customCtrl = document.getElementById('custom-ctrl');
  const customSemi = document.getElementById('custom-semi');
  const barsInput  = document.getElementById('bars-input');
  const exportBtn  = document.getElementById('export-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const playBtn    = document.getElementById('play-btn');

  let visualObj      = null;
  let activeSynth    = null;
  let activeAudioCtx = null;
  let playEndTimer   = null;

  function stopPlayback() {
    if (activeSynth) {
      try { activeSynth.stop(); } catch(e) {}
      activeSynth = null;
    }
    if (activeAudioCtx) {
      try { activeAudioCtx.close(); } catch(e) {}
      activeAudioCtx = null;
    }
    clearTimeout(playEndTimer);
    playEndTimer = null;
    playBtn.textContent = '▶ Play';
    playBtn.classList.remove('playing');
    playBtn.disabled = false;
  }

  function transpose() {
    return transpSel.value === 'custom'
      ? (parseInt(customSemi.value) || 0)
      : parseInt(transpSel.value);
  }

  function render() {
    stopPlayback();
    localStorage.setItem('score-editor-abc', abcInput.value);
    const result = ABCJS.renderAbc('score-output', abcInput.value, {
      responsive:      'resize',
      visualTranspose: transpose(),
      barsperstaff:    parseInt(barsInput.value) || 4,
      paddingleft:     0,
      paddingright:    0,
      paddingtop:      0,
    });
    visualObj = result && result.length ? result[0] : null;
  }

  // ── PDF pagination ──────────────────────────────────────
  function findStaffRows(svg) {
    const vb = svg.viewBox.baseVal;
    for (const sel of ['.abcjs-staff-group', '.abcjs-row', '.abcjs-system', '.abcjs-staff']) {
      const els = [...svg.querySelectorAll(sel)].filter(el => {
        try { const b = el.getBBox(); return b.width > vb.width * 0.25 && b.height > 5; }
        catch { return false; }
      });
      if (els.length >= 2) {
        return els
          .map(el => { const b = el.getBBox(); return { top: b.y, bottom: b.y + b.height }; })
          .sort((a, b) => a.top - b.top);
      }
    }
    const intervals = [];
    svg.querySelectorAll('path, rect, use, text, line, ellipse, circle, polygon').forEach(el => {
      try {
        const b = el.getBBox();
        if (b.height > 0.5 && b.width > 0.5) intervals.push([b.y, b.y + b.height]);
      } catch {}
    });
    if (!intervals.length) return [];
    intervals.sort((a, b) => a[0] - b[0]);
    const merged = [[...intervals[0]]];
    for (const [s, e] of intervals.slice(1)) {
      const last = merged[merged.length - 1];
      if (s <= last[1] + 2) { last[1] = Math.max(last[1], e); }
      else { merged.push([s, e]); }
    }
    const minGap = Math.max(vb.width * 0.02, 8);
    const rows = [];
    let rowTop = 0, rowBottom = merged[0][1];
    for (let i = 1; i < merged.length; i++) {
      if (merged[i][0] - merged[i - 1][1] >= minGap) {
        rows.push({ top: rowTop, bottom: rowBottom });
        rowTop = merged[i][0];
      }
      rowBottom = merged[i][1];
    }
    rows.push({ top: rowTop, bottom: rowBottom });
    if (rows.length) rows[0].top = 0;
    return rows;
  }

  function buildPrintPages() {
    const output = document.getElementById('score-output');
    if (document.getElementById('print-pages')) return;
    const prevHidden = output.querySelector('svg[data-print-hidden]');
    if (prevHidden) { prevHidden.style.display = ''; delete prevHidden.dataset.printHidden; }
    const scorePanel = document.getElementById('score-panel');
    const panelHidden = window.getComputedStyle(scorePanel).display === 'none';
    if (panelHidden) {
      scorePanel.style.display = 'flex';
      scorePanel.style.visibility = 'hidden';
    }
    try {
      const svg = output.querySelector('svg');
      if (!svg) return;
      const vb = svg.viewBox.baseVal;
      if (!vb || vb.width === 0) return;
      const pageH = vb.width * (252 / 180);
      const rows = findStaffRows(svg);
      if (!rows.length || rows.at(-1).bottom <= pageH) return;
      const pagesRows = [];
      let currentPage = [], pageStart = 0;
      for (const row of rows) {
        if (row.bottom - pageStart > pageH && currentPage.length) {
          pagesRows.push(currentPage);
          pageStart = row.top;
          currentPage = [row];
        } else {
          currentPage.push(row);
        }
      }
      if (currentPage.length) pagesRows.push(currentPage);
      if (pagesRows.length < 2) return;
      svg.dataset.printHidden = '1';
      svg.style.display = 'none';
      const svgHTML   = svg.innerHTML;
      const container = document.createElement('div');
      container.id    = 'print-pages';
      pagesRows.forEach((pageRows, i) => {
        const isFirst = i === 0;
        const isLast  = i === pagesRows.length - 1;
        const clipY = isFirst ? 0 : (pagesRows[i - 1].at(-1).bottom + pageRows[0].top) / 2;
        const clipEnd = isLast ? pageRows.at(-1).bottom : (pageRows.at(-1).bottom + pagesRows[i + 1][0].top) / 2;
        const clipH = clipEnd - clipY;
        const div = document.createElement('div');
        div.className = 'print-page';
        if (!isFirst) div.style.cssText = 'break-before:page;page-break-before:always';
        const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        s.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        s.setAttribute('viewBox', `${vb.x} ${clipY} ${vb.width} ${clipH}`);
        s.setAttribute('overflow', 'hidden');
        s.style.cssText = 'width:100%;height:auto;display:block';
        s.innerHTML = svgHTML;
        div.appendChild(s);
        container.appendChild(div);
      });
      output.appendChild(container);
    } finally {
      if (panelHidden) {
        scorePanel.style.display = '';
        scorePanel.style.visibility = '';
      }
    }
  }

  function restoreAfterPrint() {
    document.getElementById('print-pages')?.remove();
    const hidden = document.querySelector('#score-output svg[data-print-hidden]');
    if (hidden) { hidden.style.display = ''; delete hidden.dataset.printHidden; }
  }

  async function togglePlayback() {
    if (activeSynth) { stopPlayback(); return; }
    if (!visualObj) return;
    if (!ABCJS.synth || !ABCJS.synth.supportsAudio()) {
      alert('Audio playback is not supported in this browser.');
      return;
    }

    playBtn.textContent = 'Loading…';
    playBtn.disabled = true;

    // Create AudioContext synchronously inside the click handler (Safari requirement).
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioContext = new AudioCtx();
    activeAudioCtx = audioContext;

    // iOS Safari: play a silent 1-sample buffer synchronously to keep the audio
    // session "unlocked" through subsequent async awaits. Without this the context
    // can silently re-suspend between await synth.init() and synth.start().
    try {
      const silentBuf = audioContext.createBuffer(1, 1, audioContext.sampleRate);
      const silentSrc = audioContext.createBufferSource();
      silentSrc.buffer = silentBuf;
      silentSrc.connect(audioContext.destination);
      silentSrc.start(0);
    } catch (_) {}

    try {
      if (audioContext.state === 'suspended') await audioContext.resume();

      const synth = new ABCJS.synth.CreateSynth();
      await synth.init({ visualObj, audioContext, options: {} });
      const primed = await synth.prime();

      // Re-check after async work — iOS may re-suspend during awaits.
      if (audioContext.state === 'suspended') await audioContext.resume();

      activeSynth = synth;
      playBtn.textContent = '■ Stop';
      playBtn.classList.add('playing');
      playBtn.disabled = false;
      synth.start();

      const ms = primed && primed.duration ? primed.duration * 1000 + 300 : null;
      if (ms) playEndTimer = setTimeout(() => { if (activeSynth === synth) stopPlayback(); }, ms);
    } catch(e) {
      console.warn('Playback failed:', e);
      stopPlayback();
    }
  }

  playBtn.addEventListener('click', togglePlayback);

  clearBtn.addEventListener('click', () => {
    if (abcInput.value && !confirm('Clear all ABC notation?')) return;
    abcInput.value = '';
    localStorage.removeItem('score-editor-abc');
    render();
  });

  exportBtn.addEventListener('click', () => {
    buildPrintPages();
    window.print();
  });

  window.addEventListener('beforeprint', buildPrintPages);
  window.addEventListener('afterprint',  restoreAfterPrint);

  transpSel.addEventListener('change', () => {
    customCtrl.style.display = transpSel.value === 'custom' ? 'flex' : 'none';
    render();
  });

  customSemi.addEventListener('input', render);
  barsInput.addEventListener('input', render);
  abcInput.addEventListener('input', render);

  document.getElementById('tab-bar').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('#main > div').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'score-panel') render();
  });

  // Restore last session, then render
  const saved = localStorage.getItem('score-editor-abc');
  if (saved !== null) abcInput.value = saved;
  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.warn);
  }
</script>

</body>
</html>
